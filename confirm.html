<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お申し込み確認 - 夢のバンドフェス2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #070b14;
            color: #eef2f7;
            font-family: 'Noto Sans JP', sans-serif;
            padding: 1.5rem;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 3rem 2rem;
            text-align: center;
            animation: scaleIn 0.4s ease;
        }
        .icon {
            width: 80px; height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; font-weight: 700; color: white;
        }
        .icon--success { background: #10b981; }
        .icon--already { background: #06b6d4; }
        .icon--error { background: #f43f5e; }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        .title--success { color: #10b981; }
        .title--already { color: #06b6d4; }
        .title--error { color: #f43f5e; }
        p { color: rgba(238,242,247,0.6); line-height: 1.7; font-size: 0.95rem; }
        .receipt {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.1em;
            color: #eef2f7;
        }
        .footer-msg {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: rgba(238,242,247,0.4);
        }
        .loading { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #06b6d4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div class="card" id="card">
        <div class="loading" id="loadingState">
            <div class="spinner"></div>
            <p>確認処理中...</p>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');
        const message = params.get('message');
        const receipt = params.get('receipt');

        document.addEventListener('DOMContentLoaded', () => {
            // Short delay for visual feedback
            setTimeout(() => renderResult(), 500);
        });

        function renderResult() {
            const card = document.getElementById('card');

            if (!status) {
                card.innerHTML = renderError('無効なアクセスです。', 'メール内の確認リンクからアクセスしてください。');
                return;
            }

            const configs = {
                success: { icon: '✓', title: 'お申し込み確定', cls: 'success' },
                already: { icon: '✓', title: '確認済み', cls: 'already' },
                error: { icon: '!', title: 'エラー', cls: 'error' }
            };

            const cfg = configs[status] || configs.error;

            card.innerHTML = `
                <div class="icon icon--${cfg.cls}">${cfg.icon}</div>
                <h1 class="title--${cfg.cls}">${cfg.title}</h1>
                <p>${decodeURIComponent(message || '')}</p>
                ${receipt ? `<p class="receipt">受付番号: ${decodeURIComponent(receipt)}</p>` : ''}
                ${status === 'success' ? '<p class="footer-msg">当日お会いできることを楽しみにしています！</p>' : ''}
            `;
        }

        function renderError(title, msg) {
            return `
                <div class="icon icon--error">!</div>
                <h1 class="title--error">${title}</h1>
                <p>${msg}</p>
            `;
        }
    </script>
</body>
</html>
